# ~10 PLACEHOLDER Klee cards (spec §9 M4): these exercise the schema and
# the bomb/spark/reaction systems. They are NOT designs — the real card
# sheet arrives separately. Klee is catalyst-grade (design doc §2.3):
# every attack applies pyro.
- id: pyro_jab
  name: "Pyro Jab"
  cost: 1
  type: attack
  rarity: basic
  element: pyro
  solve: [frontload]
  archetypes: [generic]
  role: glue
  effects:
    - {op: damage, amount: 5, target: enemy, applies_element: true}

- id: dodge
  name: "Dodge"
  cost: 1
  type: skill
  rarity: basic
  solve: [block]
  archetypes: [generic]
