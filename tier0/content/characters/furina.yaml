    - swelling_overture
  # The companion-depth plan: Chevreuse's full 3-card kit as the star
  # (the §10 counterweight route — Vaporize off her own hydro), plus the
  # Spotlight machinery. Draft-gated high-ceiling; luck-gated is the slot.
  spotlight_weighted:
    - chevreuse_interdiction_fire
    - chevreuse_interdiction_fire
    - chevreuse_vanguards_valor
    - chevreuse_bursting_grenades
    - lynette_box_trick
    - an_invitation
    - guest_list
