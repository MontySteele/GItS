  # Plausible drafts (round-3 principle), not monocultures — each carries
  # natural cross-archetype draft-ins.
  salon_weighted:
    - gentilhomme_usher
    - surintendante_chevalmarin
    - mademoiselle_crabaletta
    - dinner_service
    - usher_the_waves
    - matinee_performance
    - rising_tide
    - house_call
