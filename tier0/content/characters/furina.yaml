# Furina — sheet pass 1 (furina-kickoff-v0.1.md governs; statline CLEARED
# by redpen 2026-07-20). Card pool lives in docs/furina-cards.yaml (loader
# reads the docs sheet directly; single source of truth).
# Declared 7-axis targets (kickoff §2): A1 1.0-1.5 (load-bearing weakness),
# A2 ~3.0, A3 ~2.5, A4 4.3 (elite), A5 3.7, A6 4.2 (elite), A7 ~2.0
# (declared weakness). Exactly two elite axes: A4 + A6.
id: furina
name: "Furina"
hp: 60                   # RATIFIED (R17, 2026-07-20)
nation: fontaine         # §4.1 reward weighting: Fontaine is her half
element: hydro
cadence: skill           # Skill-grade (kickoff §1): only Skill/Burst-tagged
                         # cards apply hydro; engine rule in effects._element_for
burst_max: 70            # RATIFIED (R17, 2026-07-20): particles from skill
                         # tags (5), reactions (5), Salon ticks (2/member/
                         # turn), Encore spend (1/point). Klee=40, nuke~90.
fanfare: true            # Fanfare cap = FANFARE_CAP_FRACTION x maxHP
kit: [let_the_people_rejoice]   # v1.9: Burst is kit, not loot
# Ethereal Spotlight (kickoff §3.1): her starting relic adds the selector
# card to hand each turn.
relic_hooks: [ethereal_spotlight]
# Identity constraint (kickoff §2 shape): her sustain must dominate her
# frontload — hard on starter and the archetype median, warn on packages.
constraints: ["A4_sustain>A1_frontload"]
archetype_decks:
  salon_weighted: salon
  spotlight_weighted: spotlight
  fanfare_weighted: fanfare
# NO winrate_bands yet: bands are ratified artifacts (pass-3 pattern);
# the report's winrate proposals remain proposals (salon bands proposed,
# spotlight/fanfare deliberately held until the R16 world lands).
# A2 deck bands RATIFIED by R19 (2026-07-20) under the lag-not-growth
# reading (curve exponents 0.07-0.28: the ratio instrument inflates
# A1-dreadful engines; Klee deck-band precedent). spotlight_weighted
# BANDED AT PASS 2 per R19's schedule, in the R16 world: measured 4.0
# at 1000 fights + the 0.3 margin convention. Red-pen may adjust.
deck_bands:
  A2_scaling:
    salon_weighted: 7.6
    fanfare_weighted: 4.2
    spotlight_weighted: 4.3
starting_deck:
  - soloists_solicitation
  - soloists_solicitation
  - soloists_solicitation
  - stage_presence
  - stage_presence
  - stage_presence
  - regal_bearing
  - aria_of_recompense
  - salon_debut
  - an_invitation
