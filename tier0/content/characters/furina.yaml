    - commanding_gaze
  fanfare_weighted:
    - curtain_up
    - curtain_up
    - suffering_for_art
    - dramatic_entrance
    - crowd_work
    - tempo_change
    - ebb_and_flow
    - audience_participation
    - crescendo
    - showstopper
    - florid_cadenza
    - hearts_swelling
    - rapturous_applause
    - universal_revelry
    # draft-ins:
