# Klee — real design (klee-character-design.md §3). Card pool lives in
# docs/klee-cards.yaml + docs/mondstadt-companions.yaml (loader reads the
# docs sheets directly; single source of truth).
# Declared statline targets (±0.5): A1 4.5, A6 4.0, A3 2.0, A4 1.5.
id: klee
name: "Klee"
hp: 62
nation: mondstadt        # §4.1 reward weighting: her same-nation half
element: pyro
cadence: catalyst        # every attack applies pyro
burst_max: 40
# v1.9: the Burst is kit, not loot -- granted to hand when the meter first
# fills. The sheet's kit_card flag and this list must agree (loader checks).
kit: [sparks_n_splash]
relic_hooks: [spark_on_detonation]   # Pounding Surprise
# Ruling 3.4 as restructured in round 3: A1>A2 is HARD on starter and on
# the median across archetype decks; a warning on individual packages.
constraints: ["A1_frontload>A2_scaling"]
# Round-3 heuristic restructure: identity is judged on starter + the
# per-axis median of these decks, with per-deck A2 bands.
archetype_decks:
  demolition_weighted: demolition   # deck: pilot
  spark_weighted: spark
  reaction_weighted: reaction
deck_bands:
  A2_scaling:
    demolition_weighted: 4.8
    spark_weighted: 4.5
    reaction_weighted: 3.5
# Authored-package floors (v0.2 playtest pass). These 25-card batteries now
# reach the 40-point kit Burst reliably and are ceiling-saturated; realistic
# Act-1 runs own the upper-power comparison instead of pretending these are
# draft-sized decks. Keep matchup floors here and measure ceilings in Tier 0.5.
# Matchup texture is part of each archetype's stated identity:
# demolition = boss specialist, spark = act-fight specialist,
# reaction = co-op-primary (floor only; solo boss plan = control).
# Process fix: checked only at >=1000 fights (binomial noise).
winrate_bands:
  tank_boss:
    demolition_weighted: [0.85, null]
    spark_weighted: [0.45, null]
    reaction_weighted: [0.35, null]
  gauntlet:
    reaction_weighted: [0.75, null]
starting_deck:
  - kaboom
  - kaboom
  - kaboom
  - kaboom
  - duck_and_cover
  - duck_and_cover
  - duck_and_cover
  - duck_and_cover
  - jumpy_dumpty
  - pop
# Tier 0.5 / the shipped mod replaces one basic Attack and one basic defense
# at run creation. Both rolls are deliberately Mondstadt-only: Klee starts
# with one reliable off-element applier, while Barbara and Prune compete for
# the support slot without precommitting the deck to a single reaction.
randomized_starter:
  attack: {replace: kaboom, choices: [dahlia_sacramental_shower, kaeya_frostgnaw]}
  support: {replace: duck_and_cover, choices: [barbara_melody, prune_witch_hunt]}
packages:
  # Round-3 principle: archetype packages model PLAUSIBLE DRAFTS, not
  # monocultures — each carries its natural cross-archetype draft-ins.
  demolition_weighted:
    - mine_toss
    - mine_toss
    - fish_flavored_bait
    - double_pop
    - bomb_voyage
    - chain_fuse
    - quick_fuse
    - ammo_scavenging
    - remote_detonator
    - explosives_workshop
    - blazing_delight
    - sorry_jean
    # draft-ins a human obviously takes:
    - blast_radius
    - hide_and_seek
    - spooked
  spark_weighted:
    - sparkly_treasure
    - sparkly_treasure
    - crackle
    - spark_collection
    - pocket_fireworks
    - tail_of_flame
    - skip_and_hop
    - spark_knight_style
    - endless_fireworks
    - gleeful_barrage
    - patched_dress
    - cant_catch_me
    # draft-ins:
    - blast_radius
    - alchemical_curiosity
    - hide_and_seek
  # Canonical reaction deck (round-3 ruling: the "reaction_burst" build).
  # Real draft: 6 companions, her amp payoffs, defense a drafter takes
  # before a boss, and her Burst ACCELERATORS -- the Burst itself is kit
  # (v1.9), arrives by charging, and no longer sits in any deck list.
  # Solo floors: tank_boss >=35%, gauntlet >=75%.
  # TIER2-VALIDATE: reaction co-op (partner as boss plan; Tier 0 can't).
  reaction_weighted:
    - dahlia_sacramental_shower
    - dahlia_favonian_favor
    - fischl_nightrider
    - fischl_nightrider
    - fischl_oz
    - kaeya_frostgnaw
    - sucrose_gust
    - sizzle
    - sizzle
    - perfect_timing
    - boom_goes_the_dynamite
    - flame_dance
    - combustion_study
    - hide_and_seek
    - spooked
  # §7.3 watchlist configs (degeneracy hunts, not realistic decks).
  melt_stack:
    - vermillion_pact
    - durin_witchs_flame
    - kaeya_frostgnaw
    - kaeya_frostgnaw
    - diona_icy_paws
    - sizzle
    - boom_goes_the_dynamite
    - big_badda_boom
    - alchemical_curiosity
    - combustion_study
  barrage_engine:
    - gleeful_barrage
    - gleeful_barrage
    - endless_fireworks
    - true_spark_knight
    - sparkly_treasure
    - sparkly_treasure
    - spark_collection
    - sugar_rush
    - da_da_da
    - skip_and_hop
    - cant_catch_me
  loop_density:
    - playtime_forever
    - blazing_delight
    - chained_reactions
    - quick_fuse
    - all_my_treasures
    - mine_toss
    - bomb_voyage
    - double_pop
    - ammo_scavenging
    - secret_stash
  # R37 measurement cells (2026-07-20): Catalytic Conversion's upgrade is
  # now {innate: true} -- sim-expressible, so the R24 no-unmeasured-upgrades
  # law is SATISFIED, not waived. Two cells, ONE variable (the +): the
  # reaction deck with the power drawn normally vs opening-hand. Not an
  # archetype deck; never enters the identity median.
  catalytic_cell_base:
    - catalytic_conversion
    - dahlia_sacramental_shower
    - dahlia_favonian_favor
    - fischl_nightrider
    - fischl_nightrider
    - fischl_oz
    - kaeya_frostgnaw
    - sucrose_gust
    - sizzle
    - sizzle
    - combustion_study
    - hide_and_seek
  catalytic_cell_innate:
    - catalytic_conversion+
    - dahlia_sacramental_shower
    - dahlia_favonian_favor
    - fischl_nightrider
    - fischl_nightrider
    - fischl_oz
    - kaeya_frostgnaw
    - sucrose_gust
    - sizzle
    - sizzle
    - combustion_study
    - hide_and_seek
  # R38 measurement cells (2026-07-20): hot_hands adopts the R37 innate
  # disposition (its old {remove: self_damage} delta was codegen-
  # inexpressible; R24 law: measure before it ships). Two cells, ONE
  # variable (the +): the spark deck with the enabler drawn normally vs
  # opening-hand. Not an archetype deck; never enters the identity median.
  hot_hands_cell_base:
    - hot_hands
    - sparkly_treasure
    - sparkly_treasure
    - crackle
    - spark_collection
    - pocket_fireworks
    - tail_of_flame
    - skip_and_hop
    - spark_knight_style
    - endless_fireworks
    - gleeful_barrage
    - cant_catch_me
  hot_hands_cell_innate:
    - hot_hands+
    - sparkly_treasure
    - sparkly_treasure
    - crackle
    - spark_collection
    - pocket_fireworks
    - tail_of_flame
    - skip_and_hop
    - spark_knight_style
    - endless_fireworks
    - gleeful_barrage
    - cant_catch_me
  # A4 probe, v2 (R8). The old barbara_injection instrument died with the
  # conjunctive healing law -- its heals converted to block/meter, so a
  # card-based probe can no longer exist below 5-star Rare (and Mondstadt
  # has no rare healer designed). New instrument: the heal_after_won_fight
  # relic hook (Burning Blood -- the SAME trickle anchoring ref_ironclad's
  # A4 baseline, and a shape the law explicitly exempts), injected via
  # package_relic_hooks below. Deck list unchanged from barbara_injection
  # (the converted cards stay as sustain-through-block support). A4 raw
  # for this probe changes class and magnitude (card heals ~12/fight ->
  # relic 6/fight): flagged in the M8 report, not silently continuous.
  sustain_probe:
    - barbara_melody
    - barbara_melody
    - barbara_shining_idol
    - bennett_fantastic_voyage
    - dahlia_sacramental_shower
    - fischl_nightrider
    - kaeya_frostgnaw
    - sizzle
    - flame_dance
    - combustion_study
    - mine_toss
    - hide_and_seek
  # §7.4 dream team: Prune + Durin + Nicole + Albedo forced in.
  dream_team:
    - prune_witch_hunt
    - durin_witchs_flame
    - nicole_celestial_gift
    - albedo_solar_isotoma
    - dahlia_sacramental_shower
    - fischl_nightrider
    - kaeya_frostgnaw
    - sizzle
    - flame_dance
    - mine_toss
    - hide_and_seek
    - alchemical_curiosity
# R8 A4 instrument: probe-only relic hooks, merged into relic_hooks when
# the named package is built. HARNESS INSTRUMENTATION, not character kit —
# Klee does not ship with Burning Blood; the probe borrows the anchor's
# exempt relic trickle so the A4 axis keeps a validated instrument.
package_relic_hooks:
  sustain_probe: [heal_after_won_fight]
