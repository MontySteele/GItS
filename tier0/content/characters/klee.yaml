# Klee — real design (klee-character-design.md §3). Card pool lives in
# docs/klee-cards.yaml + docs/mondstadt-companions.yaml (loader reads the
# docs sheets directly; single source of truth).
# Declared statline targets (±0.5): A1 4.5, A6 4.0, A3 2.0, A4 1.5.
id: klee
name: "Klee"
hp: 62
element: pyro
cadence: catalyst        # every attack applies pyro
burst_max: 60
relic_hooks: [spark_on_detonation]   # Pounding Surprise
# Ruling 3.4 as restructured in round 3: A1>A2 is HARD on starter and on
# the median across archetype decks; a warning on individual packages.
constraints: ["A1_frontload>A2_scaling"]
# Round-3 heuristic restructure: identity is judged on starter + the
# per-axis median of these decks, with per-deck A2 bands.
archetype_decks:
  demolition_weighted: demolition   # deck: pilot
  spark_weighted: spark
  reaction_weighted: reaction
deck_bands:
  A2_scaling:
    demolition_weighted: 4.8
    spark_weighted: 4.5
    reaction_weighted: 3.5
starting_deck:
  - kaboom
  - kaboom
  - kaboom
  - kaboom
  - duck_and_cover
  - duck_and_cover
  - duck_and_cover
  - duck_and_cover
  - jumpy_dumpty
  - pop
packages:
  # Round-3 principle: archetype packages model PLAUSIBLE DRAFTS, not
  # monocultures — each carries its natural cross-archetype draft-ins.
  demolition_weighted:
    - mine_toss
    - mine_toss
    - fish_flavored_bait
    - double_pop
    - bomb_voyage
    - chain_fuse
    - quick_fuse
    - ammo_scavenging
    - remote_detonator
    - explosives_workshop
    - blazing_delight
    - sorry_jean
    # draft-ins a human obviously takes:
    - blast_radius
    - hide_and_seek
    - spooked
  spark_weighted:
    - sparkly_treasure
    - sparkly_treasure
    - crackle
    - spark_collection
    - pocket_fireworks
    - tail_of_flame
    - skip_and_hop
    - spark_knight_style
    - endless_fireworks
    - gleeful_barrage
    - patched_dress
    - cant_catch_me
    # draft-ins:
    - blast_radius
    - alchemical_curiosity
    - hide_and_seek
  # Canonical reaction deck (round-3 ruling: the "reaction_burst" build).
  # Real draft: 6 companions, her amp payoffs, defense a drafter takes
  # before a boss, and — the piece every earlier test deck missed — her
  # Burst plus accelerators. Solo floors: tank_boss >=35%, gauntlet >=75%.
  # TIER2-VALIDATE: reaction co-op (partner as boss plan; Tier 0 can't).
  reaction_weighted:
    - xingqiu_raincutter
    - xingqiu_rain_swords
    - fischl_nightrider
    - fischl_nightrider
    - fischl_oz
    - kaeya_frostgnaw
    - sucrose_gust
    - sizzle
    - sizzle
    - perfect_timing
    - boom_goes_the_dynamite
    - flame_dance
    - sparks_n_splash
    - combustion_study
    - hide_and_seek
    - spooked
  # §7.3 watchlist configs (degeneracy hunts, not realistic decks).
  melt_stack:
    - vermillion_pact
    - durin_witchs_flame
    - kaeya_frostgnaw
    - kaeya_frostgnaw
    - diona_icy_paws
    - sizzle
    - boom_goes_the_dynamite
    - big_badda_boom
    - alchemical_curiosity
    - combustion_study
  barrage_engine:
    - gleeful_barrage
    - gleeful_barrage
    - endless_fireworks
    - true_spark_knight
    - sparkly_treasure
    - sparkly_treasure
    - spark_collection
    - sugar_rush
    - da_da_da
    - skip_and_hop
    - cant_catch_me
  loop_density:
    - playtime_forever
    - blazing_delight
    - chained_reactions
    - quick_fuse
    - all_my_treasures
    - mine_toss
    - bomb_voyage
    - double_pop
    - ammo_scavenging
    - secret_stash
  # Ruling 1: canonical A4 probe — Barbara at realistic draft rates.
  # Doubles as the companion-sustain-patching validation.
  barbara_injection:
    - barbara_melody
    - barbara_melody
    - barbara_shining_idol
    - bennett_fantastic_voyage
    - xingqiu_raincutter
    - fischl_nightrider
    - kaeya_frostgnaw
    - sizzle
    - flame_dance
    - combustion_study
    - mine_toss
    - hide_and_seek
  # §7.4 dream team: Prune + Durin + Nicole + Albedo forced in.
  dream_team:
    - prune_witch_hunt
    - durin_witchs_flame
    - nicole_celestial_gift
