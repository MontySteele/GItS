# The common relic pool (relic-content pass). Real StS2 wiki numbers, each
# expressed as a list of relic_effects dicts keyed by `hook` (mirroring the
# card DSL's `op` idiom). Combat-scoped hooks are consumed by
# tier0/engine/relics.py off Player.relic_effects; run-scoped hooks are applied
# in tier05/relics.py + tier05/model.py. See MEMORY / workflow spec.
#
# LAYER BOUNDARY: nothing here touches the frozen tier0 battery. Battery players
# carry no relic_effects, so every relic code path is a dead branch there.

# --- COMMON pool: shared by both characters (the reward/loot pool). ----------
common:
  anchor:
    name: "Anchor"
    effects:
      - {hook: combat_start_block, amount: 10}

  vajra:
    name: "Vajra"
    effects:
      - {hook: combat_start_power, power: strength, amount: 1}

  blood_vial:
    name: "Blood Vial"
    effects:
      - {hook: combat_start_heal, amount: 2}

  lantern:
    name: "Lantern"
    effects:
      - {hook: combat_start_energy, amount: 1}

  bag_of_preparation:
    name: "Bag of Preparation"
    effects:
      - {hook: combat_start_draw, amount: 2}

  bag_of_marbles:
    name: "Bag of Marbles"
    effects:
      - {hook: combat_start_enemy_power, power: vulnerable, amount: 1}

  red_mask:
    name: "Red Mask"
    effects:
      - {hook: combat_start_enemy_power, power: weak, amount: 1}

  festive_popper:
    name: "Festive Popper"
    effects:
      - {hook: combat_start_aoe, amount: 9}

  gorget:
    name: "Gorget"
    # `plating` already exists in refpowers.py -- combat_start_power routes it
    # through powers.apply_power like any other power.
    effects:
      - {hook: combat_start_power, power: plating, amount: 4}

  happy_flower:
    name: "Happy Flower"
    effects:
      - {hook: every_n_turns_energy, n: 3, amount: 1}

  pendulum:
    name: "Pendulum"
    effects:
      - {hook: every_n_turns_draw, n: 3, amount: 1}

  centennial_puzzle:
    name: "Centennial Puzzle"
    effects:
      - {hook: on_first_hp_loss_draw, amount: 3}

  strike_dummy:
    name: "Strike Dummy"
    # substring match against card id OR name (engine folds it in before
    # strength/vulnerable). Lowercase 'strike' matches our snake_case ids.
    effects:
      - {hook: card_name_damage_bonus, substring: strike, amount: 3}

  # --- run-scoped commons (applied in tier05, never handed to combat) --------
  strawberry:
    name: "Strawberry"
    effects:
      - {hook: on_pickup_maxhp, amount: 7}

  amethyst_aubergine:
    name: "Amethyst / Aubergine"
    effects:
      - {hook: gold_per_fight, amount: 15}

  meal_ticket:
    name: "Meal Ticket"
    effects:
      - {hook: shop_heal, amount: 15}

  regal_pillow:
    name: "Regal Pillow"
    effects:
      - {hook: post_rest_heal, amount: 15}

  venerable_tea_set:
    name: "Venerable Tea Set"
    effects:
      - {hook: post_rest_energy, amount: 2}

  war_paint:
    name: "War Paint"
    # upgrade 2 random Skills on pickup (run-layer deck op).
    effects:
      - {hook: pickup_upgrade, kind: skill, count: 2}

  whetstone:
    name: "Whetstone"
    effects:
      - {hook: pickup_upgrade, kind: attack, count: 2}

  book_of_five_rings:
    name: "Book of Five Rings"
    effects:
      - {hook: book_of_five_rings, per: 5, heal: 20}

  potion_belt:
    name: "Potion Belt"
    # Deferred from W1. Run-scoped: on pickup it raises the run's held-potion
    # capacity by 2 (handled in tier05/relics.py + model.py). Inert unless the
    # run also grants potions -- a grant_relics-only run holds it harmlessly.
    effects:
      - {hook: potion_slots, amount: 2}

  red_skull:
    name: "Red Skull"
    # Ironclad-ONLY: while at/below 50% max HP, +3 Strength. Combat-scoped
    # conditional_power; owner-gated so a non-Ironclad holder gets nothing.
    owner: [ref_ironclad, real_ironclad]
    effects:
      - {hook: conditional_power, power: strength, amount: 3, when: hp_below, threshold: 0.5}

# --- NEOW persistent relics (define now; the run-start PICK is W2). ----------
neow:
  booming_conch:
    name: "Booming Conch"
    # On ELITE fights only: model injects combat_start_draw + combat_start_energy
    # into that fight's effects.
    effects:
      - {hook: elite_combat_start, draw: 2, energy: 1}

  fishing_rod:
    name: "Fishing Rod"
    # Every 3rd normal (N) combat won: upgrade a random upgradable deck card.
    effects:
      - {hook: fishing_rod, per: 3}

  golden_pearl:
    name: "Golden Pearl"
    effects:
      - {hook: gold_on_pickup, amount: 150}

  # --- W2: three more CODEABLE Neow boons so pick-1-of-3 is meaningful. Only
  # positive, codeable boons are added -- curse/transform/colorless/cross-
  # character boons are OUT OF SCOPE this pass (unshipped mechanics; logged
  # here rather than faked) and are deliberately absent from the pool.
  ossified_relic:
    name: "Ossified Relic"          # Neow max-HP boon
    effects:
      - {hook: on_pickup_maxhp, amount: 8}

  hand_of_greed:
    name: "Hand of Greed"           # bigger gold boon (> golden_pearl's 150)
    effects:
      - {hook: gold_on_pickup, amount: 250}

  astrolabe:
    name: "Astrolabe"               # "gain a random Common relic" at pickup
    effects:
      - {hook: grant_random_common}

# --- ANCIENT boons (§10.1, RATIFIED 2026-07-23): the act-boundary pick. -----
# After each NON-FINAL act boss the Ancient heals 100% of missing HP (that
# part is structural, in tier05/model.py) and offers a 1-of-3 pick from this
# pool. Representative sample of the REAL StS2 Act-2/3 Ancient boons (wiki
# harvest 2026-07-23, docs/act2-act3-roster-research.md), ratified sampling
# rule: only boons that map 1:1 onto EXISTING hooks. Transform / UI-choice /
# card-content boons are out of scope (skip-loudly, §10.9). Wiki caveat: the
# 100%-missing-HP heal number is from the Mobalytics guide; the wiki proper
# confirms the choice-of-3 but not the heal fraction.
ancient:
  sand_castle:
    name: "Sand Castle"             # Orobas (Act 2): upgrade 6 random cards
    effects:
      - {hook: pickup_upgrade, count: 6}

  yummy_cookie:
    name: "Yummy Cookie"            # Tezcatara (Act 2): upgrade 4 cards
    effects:
      - {hook: pickup_upgrade, count: 4}

  very_hot_cocoa:
    name: "Very Hot Cocoa"          # Tezcatara (Act 2): +4 energy at combat start
    effects:
      - {hook: combat_start_energy, amount: 4}

  paels_blood:
    name: "Pael's Blood"            # Pael (Act 2): +1 draw at each turn start
    effects:
      - {hook: every_n_turns_draw, n: 1, amount: 1}

  prismatic_gem:
    name: "Prismatic Gem"           # +1 energy at each turn start
    # The real pools carry THREE +1-energy-per-turn boons (Prismatic Gem /
    # Blessed Antler / Philosopher's Stone) -- the class that replaces STS1's
    # energy boss-relics. The shipped sample had none, which the Ironclad-0.6%
    # diagnosis (2026-07-23) measured as the single largest player-power
    # distortion in the 3-act world. Prismatic Gem is the one whose rider
    # ("card rewards show other colors") is faithfully a no-op in a
    # single-character pool, so it maps 1:1 onto the existing hook -- the
    # ratified sampling rule. Antler (3 Dazed at combat start) and Stone
    # (enemies +1 Str) need new hooks: §10.9 backlog, never faked.
    effects:
      - {hook: every_n_turns_energy, n: 1, amount: 1}

  looming_fruit:
    name: "Looming Fruit"           # Nonupeipe (Act 3): +31 max HP
    effects:
      - {hook: on_pickup_maxhp, amount: 31}

  signet_ring:
    name: "Signet Ring"             # Nonupeipe (Act 3): +999 gold
    effects:
      - {hook: gold_on_pickup, amount: 999}

  diamond_diadem:
    name: "Diamond Diadem"          # Nonupeipe (Act 3): 20 block at combat start
    # UNIMPLEMENTED (§10.9): the real Diadem's block survives into the next
    # turn; modeled as plain start-of-combat block.
    effects:
      - {hook: combat_start_block, amount: 20}

# --- SKIP: relics whose mechanic tier0 lacks. NOT faked -- listed here so the
# loader emits a loud UNIMPLEMENTED warning naming the missing mechanic, and
# get_relic() refuses to hand back a hollow relic. (House rule: never
# approximate a DSL gap silently.)
skip:
  bronze_scales:
    name: "Bronze Scales"
    missing: "Thorns power (retaliation damage) is absent from tier0"
  oddly_smooth_stone:
    name: "Oddly Smooth Stone"
    missing: "Dexterity power (block scaling) is absent from tier0"
  juzu_bracelet:
    name: "Juzu Bracelet"
    missing: "no ?-room / non-combat events exist in the run model"
