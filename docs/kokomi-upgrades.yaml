# Kokomi + Inazuma upgrade deltas — v0.2 sheet pass (companion file to kokomi-cards.yaml / inazuma-companions.yaml)
# Grammar authority: upgrade-conventions.md; klee-upgrades.yaml precedents cited inline. ALL deltas PROPOSED.
# RESOURCE-CURVE LAW (Klee R1 precedent, applied to her engine): upgrades must NOT move the resource curve —
#   no gain_charge deltas, no conscript-count deltas, no cadence/aura riders. Charge lines and conscript counts
#   are printed identities; upgrades buy quality (damage/Block/draw/cost), never a faster engine.
# ceremonial_garment: NO UPGRADE (kit card, v1.9; sparks_n_splash precedent — Talent Training is v2 design space).
# KNOWN GAP, flagged not fudged: no sly-delta key exists in the applier, so Sly branches never move on upgrade
#   (drifting_lantern/tidal_lure upgrade their PLAYED faces only). Extending the dispatch is a design decision
#   about whether upgrades should sharpen the discard game — deferred to a ruling, not smuggled in here.

# ---- BASICS ----
waters_edge:       {damage: +3}          # 6->9 (R53: base stays at Strike parity; Strike+ slope)
coral_guard:       {block: +3}           # 5->8, Defend-exact
bake_kurage:       {block: +3}           # 3->6; the hydro application never moves (resource-curve law)
tactical_recall:   {draw: +1}            # burn 1, see 2 — the exhaust-teacher graduates
tide_reading:      {block: +2}           # 2->4; draw stays 1

# ---- COMMONS (one number bump each; zero cost reductions — Klee sheet law) ----
conscription_notice: {draw: +1}          # the notice replaces itself twice over; conscript count fixed at 1
to_the_front:      {add: {op: draw, amount: 1}}   # quick_fuse precedent: the 0-cost order now replaces itself
votive_offering:   {block: +3}           # 5->8
ritual_purification: {draw: +1}          # 1->2; the Charge line NEVER moves (resource-curve law)
waterspout:        {damage: +3}          # 7->10, still burns itself
cleansing_tide:    {block: +4}           # 10->14, still eats two cards
undertow_shuffle:  {draw: +1}            # 3->4; discard stays 2 (the two Sly bells are the identity)
moon_signal:       {draw: +1}            # discard 1, see 2
drifting_lantern:  {block: +2}           # played 4->6; the Sly branch stays 4 (header gap note)
surging_shoal:     {damage: +2}          # 4->6 all (blast_radius-parity slope)
jade_bulwark:      {block: +2}           # 6->8, warm_glow-exact
pulsing_current:   {damage: +3}          # 6->9, snap-exact

# ---- UNCOMMONS (bump OR keyword; two cost slots — Klee sheet law) ----
