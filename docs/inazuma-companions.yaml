# Inazuma companion pool — v0.1 KICKOFF DRAFT (ships with Kokomi; docs/kokomi-kickoff-v1.md §4 governs).
# Shared colorless-style pool, same schema as mondstadt/fontaine sheets. ALL numbers PROPOSED — nothing red-penned yet.
# Roster v0.1: the starter-reserved trio (Gorou / Sayu / Shinobu, user ruling) + Thoma + Kujou Sara (4-star bench)
# + Itto as the ONE designed 5-star Rare (eligible per the slot-4 ruling: Zhongli takes slot 4; conscription's jackpot).
# Conventions: 4-star caps at Uncommon; heals below Rare convert to Block (Charlotte precedent); 5-star Rares are the
# only true-heal slots (none designed here yet). All applies_element flags EXPLICIT (catalyst-cadence drafters must not
# auto-apply through companion hits; the Fontaine-sheet discipline).
# ERRATA NOTE (kickoff §4, on the record so it isn't "rediscovered"): Kuki Shinobu's canonical self-HP cost is DROPPED
# per Kokomi character law 1 (no self-damage in her kit or shared-pool errata). Her cards are authored costless-to-HP.
# RULED (R52, ask 9): Raiden authored below — playable characters may exist as Rare companion cards and surface in
# the conscript pool, but ONLY as a Rare payoff; the opposed lore carries the flavor. Natural rare odds (N5).
# Later scope: Kazuha (Sly/discard flavor), Heizou, Ayaka, Ayato, Yoimiya, Yae Miko 5-stars (banner roll per v1.8).

# ---------- GOROU (Geo | buffer/general | the literal adjutant) ----------
- {id: gorou_inuzaka_charge, name: "Gorou — Inuzaka Charge", star: 4, rarity: common, role_c: applier, element: geo, cost: 1, type: attack,
   effects: [{op: damage, amount: 6, target: enemy, applies_element: false}]}
   # The vanguard's opening arrow. Geo leaves no aura in the reaction table (Crystallize CONSUMES); applies_element
   # false is explicit so no cadence dial can re-tag it. Starter attack-slot card (randomized_starter).
- {id: gorou_war_banner, name: "Gorou — General's War Banner", star: 4, rarity: common, role_c: buffer, element: geo, cost: 1, type: skill,
   effects: [{op: block, amount: 4}, {op: buff_next_attack, amount: 3}]}
   # His DEF-banner identity: hold the line, then hit harder. Def-adjacent buffer per kickoff §4.
- {id: gorou_heart_of_the_clan, name: "Gorou — Heart of the Clan", star: 4, rarity: uncommon, role_c: buffer, element: geo, cost: 1, type: skill,
   effects: [{op: block, amount: 3}, {op: apply_power, power: metallicize, amount: 2, target: self}]}
   # The standing banner: 2 Block a turn while the fight lasts. Sustain-through-armor, never healing (the law).

# ---------- SAYU (Anemo | healer -> Block per law | the sleepy ninja) ----------
- {id: sayu_yoohoo_windwheel, name: "Sayu — Yoo-hoo Windwheel", star: 4, rarity: common, role_c: trigger, element: anemo, cost: 1, type: attack,
   effects: [{op: damage, amount: 4, target: enemy, applies_element: false}, {op: swirl, target: enemy}]}
   # She rolls through. Swirl spreads whatever aura she hits (Kokomi's hydro, usually).
- {id: sayu_daruma_gift, name: "Sayu — Muji-Muji Daruma", star: 4, rarity: common, role_c: buffer, element: anemo, cost: 1, type: skill,
   effects: [{op: block, amount: 4}, {op: block_next_turn, amount: 4}]}
   # Her healing daruma CONVERTED per the conjunctive law (Charlotte precedent verbatim): sustain-over-time as
   # pre-emptive Block. Starter support-slot card (randomized_starter).
- {id: sayu_naptime, name: "Sayu — Naptime", star: 4, rarity: uncommon, role_c: buffer, element: anemo, cost: 0, type: skill,
   effects: [{op: block, amount: 3}, {op: draw, amount: 1}]}
   # Free beat: she naps, you plan. Velocity glue at 0 cost.

