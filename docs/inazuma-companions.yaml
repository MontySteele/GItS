# ---------- KUJOU SARA (Electro | attack buffer — the Strength card is DELIBERATE: it exercises Flawless Strategy) ----------
- {id: sara_crowfeather_cover, name: "Kujou Sara — Crowfeather Cover", star: 4, rarity: common, role_c: buffer, element: electro, cost: 0, type: skill,
   effects: [{op: buff_next_attack, amount: 4}]}
   # The Tengu marks the target. Free, sharp, spent on the next swing.
- {id: sara_tengu_stormcall, name: "Kujou Sara — Tengu Stormcall", star: 4, rarity: uncommon, role_c: buffer, element: electro, cost: 1, type: skill,
   effects: [{op: damage, amount: 4, target: enemy, applies_element: true}, {op: apply_power, power: strength, amount: 2, target: self}]}
   # Her ATK-buff identity as real Strength. IN KOKOMI'S HANDS the Strength converts to 2 Charge at the apply_power
   # chokepoint (Flawless Strategy, kickoff §1 law 3) — the conversion is the design, not a leak; any other drafter
   # keeps the Strength. The one deliberate conversion-exerciser in the v0.1 pool.

# ---------- ARATAKI ITTO (5-star Rare | taunt/bruiser | conscription's favorite meal — slot-4 ruling) ----------
- {id: itto_superlative_superstrength, name: "Itto — Superlative Superstrength", star: 5, rarity: rare, role_c: trigger, element: geo, cost: 2, type: attack,
   effects: [{op: damage, amount: 14, target: enemy, applies_element: false}, {op: block, amount: 6}]}
   # The one and oni: a bruiser body on both sides of the card. No taunt verb exists in the DSL (implement-or-log:
   # LOGGED as out of v0.1 scope — a taunt/redirect op is a later design conversation, not silently approximated).
   # Rare = the conscription jackpot; the banner governor covers drafting him normally.

# ---------- RAIDEN SHOGUN (5-star Rare | the opposed apex — R52 ask 9) ----------
# Lorewise Kokomi and the Shogun are OPPOSED: Watatsumi bled for the Vision Hunt, and the Almighty answers no
# conscription. The card is therefore the DOCTRINE, not the woman — one borrowed instant of Musou, and the
# resistance leader's bitterest irony that it works. Rare payoff ONLY, per the ruling.
- {id: raiden_musou_no_hitotachi, name: "Raiden Shogun — Musou no Hitotachi", star: 5, rarity: rare, role_c: applier, element: electro, cost: 2, type: attack,
   effects: [{op: damage, amount: 18, target: enemy, applies_element: true}]}
   # The single slash of Musou: the pool's biggest one-card hit, and electro on Kokomi's ubiquitous hydro is the
   # Electro-Charged apex. Deliberately SHAPELESS otherwise — no Block, no rider: eternity is one perfect cut.
   # Itto is the bruiser jackpot (14+6); Raiden is the executioner jackpot (no domination pair: 18/0 vs 14/6).
   # Conscription can fish her at natural rare odds (R52/N5 — revisit only if the sims show her busted).
