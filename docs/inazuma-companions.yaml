- {id: shinobu_grass_ring_bond, name: "Shinobu — Grass Ring of Sanctification", star: 4, rarity: common, role_c: buffer, element: electro, cost: 1, type: skill,
   effects: [{op: block, amount: 5}]}
   # The ring's mending CONVERTED to Block per law. Plain on purpose: the honest wall. Starter support-slot card.
- {id: shinobu_thundergrust, name: "Shinobu — Thundergrust", star: 4, rarity: uncommon, role_c: applier, element: electro, cost: 1, type: attack,
   effects: [{op: damage, amount: 7, target: enemy, applies_element: true}]}
   # The medic can also hit. Single-target electro applier.

