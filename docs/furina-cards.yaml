# Furina card pool — v0.1 design sheet (Tier 0 simulator schema). RED-PEN 2026-07-20 (furina-sheet-redpen.md):
# basics RATIFIED as a set; salon/fanfare/generic approved as measured. [USER] items RESOLVED from docs 2026-07-20
# (DECISIONS 75): commanding_gaze parity verified vs Klee's ratified Spooked!; the_sea_is_my_stage blood raised to 6
# per kickoff §4 "nasty setup cost" law; house_call kept (threshold-family + A7 setup-tax consistent). The SPOTLIGHT list
# was RE-AUTHORED at pass 2 under R16 (card-mediated boosting): limelight/stage_lights/top_billing replace
# warm_reception/props_department/constant_star, shared_billing reworked; boosts flow through spotlight_mult_bonus powers
# (the same §2.2a numbers-only pipe). PASS 3 (R32/R33, selector-v3 world): standing_ovation FLIPPED to spend-payoff
# (+ first-play trickle), limelight/top_billing gained spend lines, shared_billing/stage_lights riders swapped to
# application/debuff, usher_the_waves gained Weak, blocking_notes rehomed block. ALL RE-AUTHORED NUMBERS PROPOSED
# pending red-pen (furina-sheet-pass-3-report.md; pass-2 numbers are the selector-v2 archive).
# Numbers tuned through 4 measured rounds against the declared statline (see furina-sheet-pass-1-report.md §2); 77 cards
# since the Salon-v2 rework added standing_room_only (docs/furina-salon-rework-plan.md — salon typed members, reprice).
# Element: hydro | Cadence: SKILL-grade (kickoff §1): damage on type:skill / burst-tag / skill_tag cards applies hydro; plain attacks never do.
# Archetypes: salon (default plan / solo floor) | spotlight (draft-gated high-ceiling) | fanfare (tempo/velocity flux) | generic
# Statline this sheet must produce (kickoff §2, CLEARED): A1 1.0-1.5 dreadful, A4 4.3 + A6 4.2 elite, A5 3.7, A7 ~2.0 weak.
# character: furina derives from the filename (loader). skill_tag marks Genshin-Skill-flavored cards (burst particles + application).
# NAMING NOTE: talent/summon names verified (Salon Solitaire cast, Soloist's Solicitation, Let the People Rejoice); other names are
# authored theatrical flavor — lore/constellation audit per v1.7 checklist before ship, as with Klee.
# Resource grammar: encore_cost and fanfare_cost are playability gates (never overdraw). Fanfare spenders resolve from
# the pre-spend audience level, then pay once, reopening room beneath the cap; spend_encore remains the priced-overdraw path.
# NO passive accrual anywhere on this sheet — no per-turn Encore or Fanfare trickle exists, and none may be added (a per-turn Encore
# power would launder passive Fanfare through the gain hook; deliberately not designed — see sheet-pass plan §5).
# SPOTLIGHT v5: Center Stage gives Furina plays Fanfare but no numeric boost; Guest Cast empowers every Companion card
# and gives no Spotlight-derived Fanfare. Fanfare payoffs spend the capped pool so generation can keep cycling.

