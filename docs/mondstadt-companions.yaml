# Mondstadt companion pool — v0.1 (ships with Klee)
# Shared colorless-style pool. Roles: applier | buffer | trigger (see principles doc §4.3)
# 4-star = common/uncommon (multi-card kits allowed). 5-star = rare, ONE card each, max 3.
# Companion cards NEVER scale and route power through the player character.

# ---------- 4-STAR (common/uncommon) ----------
- {id: dahlia_sacramental_shower, name: "Dahlia — Sacramental Shower", star: 4, rarity: common, role_c: applier, element: hydro, cost: 1, type: attack,
   effects: [{op: damage, amount: 6, target: enemy, applies_element: true}]}
- {id: dahlia_favonian_favor, name: "Dahlia — Favonian Favor", star: 4, rarity: uncommon, role_c: applier, element: hydro, cost: 1, type: skill,
   effects: [{op: block, amount: 5}, {op: apply_aura, element: hydro, target: random_enemy}]}
- {id: fischl_nightrider, name: "Fischl — Nightrider", star: 4, rarity: common, role_c: applier, element: electro, cost: 1, type: attack,
   effects: [{op: damage, amount: 5, target: enemy, applies_element: true}]}
- {id: fischl_oz, name: "Fischl — Oz, at Your Side", star: 4, rarity: uncommon, role_c: applier, element: electro, cost: 1, type: power,
   effects: [{op: apply_power, power: oz_summon, amount: 3, target: self, summon_element: electro, note: "3 turns: end of turn 3 dmg + electro to random enemy"}]}
# R8 healing-law conversions (conjunctive law: true heal = Rare AND Exhausts;
# 4-stars cap at uncommon, so no 4-star companion may true-heal):
- {id: barbara_melody, name: "Barbara — Soothing Melody", star: 4, rarity: common, role_c: buffer, element: hydro, cost: 1, type: skill,
   effects: [{op: block, amount: 6}, {op: burst_energy, amount: 4}]}
   # Song inspires: reliable one-energy defense plus a small Burst-meter rider.
- {id: barbara_shining_idol, name: "Barbara — Shining Idol", star: 4, rarity: uncommon, role_c: buffer, element: hydro, cost: 1, type: skill,
   effects: [{op: block, amount: 5}, {op: apply_aura, element: hydro, target: random_enemy}, {op: draw, amount: 1}]}
   # Playtest 2026-07-22: the cantrip does not justify a full extra energy on an energy-starved character.
- {id: sucrose_gust, name: "Sucrose — Wind Spirit Creation", star: 4, rarity: common, role_c: trigger, element: anemo, cost: 0, type: skill,
   effects: [{op: swirl, target: enemy}, {op: draw, amount: 1}]}
- {id: sucrose_astable, name: "Sucrose — Astable Anemohypostasis", star: 4, rarity: uncommon, role_c: trigger, element: anemo, cost: 1, type: skill,
   effects: [{op: swirl, target: enemy}, {op: burst_energy, amount: 8}]}
- {id: bennett_passion, name: "Bennett — Passion Overload", star: 4, rarity: common, role_c: buffer, element: pyro, cost: 0, type: skill,
   effects: [{op: buff_next_attack, amount: 4}, {op: burst_energy, amount: 5}]}
- {id: bennett_fantastic_voyage, name: "Bennett — Fantastic Voyage", star: 4, rarity: uncommon, role_c: buffer, element: pyro, cost: 1, type: skill,
   exhaust: true,
   effects: [{op: apply_power, power: strength, amount: 3, target: self}]}
   # A one-shot field: permanent Strength is useful even when Klee cannot spend
   # more cards this turn, while Exhaust keeps ordinary deck cycling from
   # turning an uncommon into unlimited scaling.
- {id: kaeya_frostgnaw, name: "Kaeya — Frostgnaw", star: 4, rarity: common, role_c: applier, element: cryo, cost: 1, type: attack,
   effects: [{op: damage, amount: 6, target: enemy, applies_element: true}]}
- {id: diona_icy_paws, name: "Diona — Icy Paws", star: 4, rarity: common, role_c: applier, element: cryo, cost: 1, type: skill,
   effects: [{op: block, amount: 5}, {op: apply_aura, element: cryo, target: random_enemy}]}

# ---------- 5-STAR (rare, one card each, max 3 per nation) ----------
- {id: albedo_solar_isotoma, name: "Albedo — Solar Isotoma", star: 5, rarity: rare, role_c: trigger, element: geo, cost: 1, type: power,
   effects: [{op: apply_power, power: solar_isotoma, amount: 3, target: self, consumes_aura: true, note: "3 turns: your attacks vs aura'd enemies grant 3 block (Crystallize engine)"}]}
- {id: durin_witchs_flame, name: "Durin — Witch's Flame", star: 5, rarity: rare, role_c: buffer, element: pyro, cost: 1, type: power,
   effects: [{op: apply_power, power: witchs_flame, amount: 6, target: self, consumes_aura: true, note: "At end of turn, consume Pyro from each enemy; per aura, deal 6 damage and gain 3 Burst Energy. Clears Klee's excess Pyro so another element can establish the next reaction."}]}
- {id: nicole_celestial_gift, name: "Nicole — Celestial Gift", star: 5, rarity: rare, role_c: buffer, element: pyro, cost: 2, type: power,
   effects: [{op: apply_power, power: celestial_gift, amount: 2, target: self, note: "your attacks +2 dmg; gain 4 block at start of turn"}]}

# ---------- PERSONAL POOL (Klee — designated teammate, not in shared pool) ----------
- {id: prune_witch_hunt, name: "Prune — Little Witch's Hunt", star: 4, rarity: uncommon, role_c: trigger, element: anemo, cost: 1, type: skill, personal_pool: klee,
   effects: [{op: swirl, target: enemy}, {op: conditional, if: reaction_triggered_by_this, then: [{op: gain_spark, amount: 1}], else: [{op: block, amount: 5}]}, {op: gain_spark, amount: 1}]}
   # Swirl already spreads the consumed aura to every enemy; targeting ALL
   # cascaded through those freshly spread auras and over-triggered reactions.
   # The fallback is mutually exclusive with Swirl, so Prune has a Defend-sized
   # body when drawn alone. A successful Swirl instead pays a second Spark,
   # making her the reaction starter's energy-cheating support rather than a
   # flat bundle of stats.
