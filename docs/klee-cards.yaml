# R36 REDESIGN (user-ratified 2026-07-20, supersedes the R10 buff): the
# unconditional gain_spark 1 that breached the ratified band (0.668 vs the
# 0.65 tank_boss ceiling, 4de7125) is DEAD. Replacement prices the Spark BY
# a forced player-chosen discard: 1 Spark per card actually discarded, empty
# hand = no Spark. Design intent on record: discard is a real cost, not an
# engine, for Klee. The R10 measurement window now measures THIS design
# (one variable, band check included); the CCM + dodge_roll errata batch
# stays queued behind that window as before.
