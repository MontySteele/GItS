chained_reactions: {chance: 0.75}                  # 50% -> 75% re-bomb
explosive_frags:   {vulnerable: +1}                # detonation vuln 1->2
sparkly_explosion: {damage: +5}                    # 18->23
all_my_treasures:  {cost: -1}                      # 3->2
fish_blasting:     {damage: +2}                    # 8->10 per X
true_spark_knight: {cost: -1}                      # 2->1
da_da_da:          {damage: +2}                    # 4->6 x3 (Exhaust stays; sparks make removal too loopy)
grand_finale:      {bonus_per_detonation: +1}      # 2->3
secret_stash:      {cards: +1}                     # adds 3 demolition commons
vermillion_pact:   {amp_percent: +5}               # 25->30, NOT 35 — amp-cap watchlist discipline
playtime_forever:  {cost: -1}                      # 3->2
best_friends_forever: {cost: -1}                   # 1->0
no_holding_back:   {damage: +4}                    # 14->18; the base HP loss was removed in the live-playtest patch

