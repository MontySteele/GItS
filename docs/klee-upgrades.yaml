# Klee + Mondstadt upgrade deltas — v0.6 (companion file to klee-cards.yaml / mondstadt-companions.yaml)
# Semantics: keys are DELTAS or replacements applied to the base card on upgrade.
#   damage/block/heal/etc: +N = add N to that amount | cost: -1 = reduce | remove: <keyword> | add: <effect>
#   For multi-effect cards, the targeted effect is named; ambiguity resolved by the note.
# Grammar authority: upgrade-conventions.md. Bursts excluded (kit, v1.9; Talent Training = v2).

# ---- BASICS ----
kaboom:            {damage: +3}                    # 7->10, survival-sprint frontload
duck_and_cover:    {block: +3}                     # 5->8, Defend-exact
jumpy_dumpty:      {damage: +2, bomb_damage: +2}   # hits 8->10; bomb 6->8
pop:               {bomb_damage: +2}               # 5->7

# ---- COMMONS (one number bump each; zero cost reductions) ----
mine_toss:         {bomb_damage: +2}
fish_flavored_bait: {bomb_damage: +2}
quick_fuse:        {add: {op: draw, amount: 1}}    # 0-cost utility gains rider
double_pop:        {bomb_damage: +2}               # 4->6 each
ammo_scavenging:   {bomb_damage: +2}
big_badda_boom:    {damage: +4}                    # 16->20, big-base row
blast_radius:      {damage: +3}                    # 9->12 AoE
chain_fuse:        {bonus: +2}                     # placed-this-turn bonus 3->5
careful_arrangement: {bonus: +2}                   # 2->4 per moved bomb
bomb_voyage:       {bomb_damage: +2}
sparkly_treasure:  {spark: +1}                     # 1->2
pocket_fireworks:  {damage: +2}                    # 5->7 x2
crackle:           {discard: +1, sparks: +1}       # R36: discard 2, add 2 Sparks (damage delta dead with the R10 buff)
spark_collection:  {spark: +1}                     # 2->3
tail_of_flame:     {conditional_bonus: +3}         # 4->7 when free
eager_to_help:     {draw: +1}                      # both branches
skip_and_hop:      {block: +2}                     # 2->4
rapid_fire:        {damage: +1}                    # 4->5 per hit (x4)
warm_glow:         {block: +2}                     # 6->8
snap:              {damage: +3}                    # 6->9; Spark rider untouched (R1: the upgrade must not move the resource curve)
sizzle:            {conditional_bonus: +3}         # aura bonus 6->9
combustion_study:  {burst_energy: +5}              # 10->15
alchemical_curiosity: {draw: +1}                   # 2->3
boom_goes_the_dynamite: {damage: +4}               # 18->22
study_of_explosions: {burst_energy: +5}            # 5->10
friendly_visit:    {draw: +1}                      # 1->2
hide_and_seek:     {block: +3}                     # 7->10
sorry_jean:        {block: +2}                     # 4->6
spooked:           {weak: +1}                      # 1->2 all
clockwork_toy:     {block: +2}                     # 5->7
run_away:          {block: +2}                     # 4->6
patched_dress:     {condition: unconditional}      # the +2 spark-bonus always applies

# ---- UNCOMMONS (bump OR keyword/condition; two cost slots + one 1->0) ----
jumpy_dumpty_mk2:  {damage: +2}                    # 8->10 x2
remote_detonator:  {bonus: +2}                     # detonation bonus 2->4
bombs_away:        {cost: -1}                      # 3->2 (uncommon cost slot)
explosives_workshop: {power_amount: +1}            # +2->+3 per copy; duplicate Powers stack without a cap
cluster_charge:    {damage: +3}                    # 10->13
trip_wire:         {bomb_damage: +3}               # 7->10
controlled_demolition: {bombs: +1}                 # X+1 -> X+2
kaboom_beetle_swarm: {bonus_vs_bombed: +2}         # 3->5
spark_knight_style: {power_amount: +1}             # +2->+3 on free attacks
endless_fireworks: {cost: -1}                      # 1->0 (engine-power precedent)
flame_on_the_wick: {damage: +3}                    # 6->9
gleeful_barrage:   {damage: +1}                    # R39: 3->4 per hit
hot_hands:         {retain: true}                  # Playtest 2026-07-22: bank the Spark enabler for the right hand; do not force its HP cost into turn 1.
cant_catch_me:     {block: +2}                     # 2->4 (base errata'd 4->2, R25 batch)
sugar_rush:        {remove: exhaust}               # classic quality upgrade (net-0 energy loop is spark-bounded)
catalytic_conversion: {innate: true}               # R37: classic power disposition -- starts in the opening hand
perfect_timing:    {damage: +2}                    # 8->10
elemental_ecstasy: {cost: -1}                      # 2->1 (uncommon cost slot)
borrowed_brilliance: {add: {op: draw, amount: 1}}  # base copy already costs 0; + replaces itself
study_buddy:       {add: {op: draw, amount: 1}}
flame_dance:       {damage: +2}                    # 9->11 all
spirited_away:     {block: +4}                     # 12->16
dodge_roll:        {block: +3}                     # 6->9 (base errata'd 8->6, R25 batch)
bright_idea:       {draw: +1}                      # 3->4, discard stays 1
surprise_visit:    {vulnerable: +1}                # 2->3

# ---- RARES (quality over quantity) ----
# sparks_n_splash: NO UPGRADE (kit card, v1.9; Talent Training = v2 design space)
